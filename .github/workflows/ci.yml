name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run linter
        run: ruff check calculadora_gordon.py ticker_search.py streamlit_app.py

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Python syntax
        run: |
          python -m py_compile calculadora_gordon.py
          python -m py_compile ticker_search.py
          python -m py_compile streamlit_app.py
          echo "All files have valid syntax"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, syntax]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run calculator tests
        run: |
          python -c "
          import calculadora_gordon as cg
          
          # Test Gordon 1
          assert cg.gordon_1estagio(1.0, 0.05, 0.10) == 21.0
          
          # Test Gordon 2
          assert abs(cg.gordon_2estagios(1.0, 0.08, 0.04, 5, 0.10) - 26.76) < 0.01
          
          # Test Graham
          assert abs(cg.graham_number(3.46, 38.66) - 54.86) < 0.01
          
          # Test OE
          assert cg.owner_earnings(3.46, 0.50, 0.30) == 3.66
          
          # Test CAPM
          assert abs(cg.capm(0.0425, 1.35, 0.10) - 0.120125) < 0.0001
          
          # Test WACC
          assert abs(cg.calcular_wacc(340, 280, 0.12, 0.045, 0.21) - 0.0819) < 0.001
          
          # Test multiples
          assert abs(cg.multiplo_atual(51.80, 3.46) - 14.97) < 0.01
          assert abs(cg.preco_alvo_multiplo(13.0, 3.46) - 44.98) < 0.01
          
          print('All tests passed!')
          "

      - name: Run BAC analysis
        run: python calculadora_gordon.py --bac

  build:
    name: Build Streamlit
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Streamlit app loads
        run: |
          python -c "
          import streamlit_app
          print('Streamlit app loaded successfully')
          "

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: RELEASE_v1.0.0.md
          draft: false
          prerelease: false
          files: |
            calculadora_gordon.py
            ticker_search.py
            streamlit_app.py
            requirements.txt
